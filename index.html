<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Grimoire Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="modal-overlay">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <div id="lobby-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:5000; overflow-y:auto;"></div>

    <div id="role-indicator" style="position:fixed; top:20px; right:20px; z-index:1000; display:none; background:rgba(0,0,0,0.8); padding:5px 10px; border-radius:5px; border:1px solid var(--gold); font-size:0.7rem; font-family:Cinzel;">
        MODO: <span id="role-text" style="color:var(--gold);">MASTER</span>
    </div>

    <div class="container">
        <div id="tab-home" class="tab-content">
            <div class="card" style="text-align:center;">
                <h1 id="campaign-title" style="font-size:2rem; margin-bottom:10px;">Aventura</h1>
                <p style="color:var(--gold-muted); font-style:italic; margin-bottom:30px;">Panel de Control</p>
                <button onclick="window.exitToLobby()" class="btn-secondary" style="width:100%;">SALIR AL LOBBY</button>
            </div>
        </div>

        <div id="tab-combat" class="tab-content">
            <div class="card">
                <h2 class="cinzel">Cámara de Batalla</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                    <button onclick="window.generateEncounter('normal')" class="btn-primary">INCURSIÓN</button>
                    <button onclick="window.generateEncounter('hard')" class="btn-primary" style="border-color:var(--gold);">GRAN DESAFÍO</button>
                </div>
                <input type="text" id="monster-search" placeholder="Buscar criatura..." onkeyup="window.searchMonsters()">
                <div id="search-results"></div>
            </div>
        </div>

        <div id="tab-botin" class="tab-content">
            <div class="card">
                <h2 class="cinzel">Cámara de Botín</h2>
                <input type="number" id="loot-cr" value="1" placeholder="CR del Encuentro">
                <button onclick="window.generateLoot(document.getElementById('loot-cr').value, 'humanoid', 'Tesoro Hallado', false)" class="btn-primary">GENERAR TESORO</button>
            </div>
        </div>

        <div id="tab-notices" class="tab-content">
            <div class="card">
                <h2 class="cinzel">Tablón de Misiones</h2>
                <div id="local-board"></div>
                <div id="mission-form-area" style="margin-top:20px; border-top:1px solid #333; padding-top:20px;">
                    <h3 class="cinzel" style="font-size:0.8rem;">Nueva Misión</h3>
                    <input type="text" id="mission-title" placeholder="Título...">
                    <textarea id="mission-text" placeholder="Instrucciones..." style="height:80px;"></textarea>
                    <button onclick="window.addMission()" class="btn-primary">CLAVAR EN TABLÓN</button>
                </div>
            </div>
        </div>

        <div id="tab-party" class="tab-content">
            <div class="card">
                <h2 class="cinzel">Gremio de Aventureros</h2>
                <div id="character-list"></div>
                <button onclick="window.showCharForm()" class="btn-primary" style="margin-top:20px;">+ REGISTRAR HÉROE</button>
            </div>
        </div>
    </div>

    <nav id="main-nav"></nav>
    <script src="app.js"></script>
</body>
</html>
