<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Grimoire Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="lobby-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:5000; overflow-y:auto; padding:40px 20px;">
        <div style="max-width:500px; margin:0 auto;">
            <h1 style="font-family:\'Cinzel\'; color:var(--gold); font-size:2.5rem; text-align:center;">Grimorio Pro</h1>
            <div class="card">
                <h2>Mis Campañas</h2>
                <div id="campaign-list"></div>
                <button onclick="showCreateCampaign()" class="btn-primary" style="margin-top:20px;">+ NUEVA CAMPAÑA</button>
            </div>
            <div id="create-campaign-form" style="display:none; margin-top:30px;" class="card">
                <h3 id="campaign-form-title">Nueva Campaña</h3>
                <input type="text" id="new-campaign-name" placeholder="Nombre de la aventura...">
                <input type="hidden" id="edit-campaign-id">
                <button onclick="saveCampaign()" class="btn-primary">GUARDAR</button>
                <button onclick="document.getElementById(\'create-campaign-form\').style.display=\'none\'" style="background:none; border:none; color:#666; width:100%; margin-top:10px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MESA DE INTERCAMBIO -->
    <div id="trade-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:7000; display:none; padding:20px; overflow-y:auto;">
        <div style="max-width:500px; margin:0 auto; width:100%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="font-family:\'Cinzel\'; color:var(--gold); margin:0;">Mesa de Intercambio</h2>
                <i class="fa-solid fa-xmark" onclick="closeTrade()" style="color:var(--gold); font-size:1.5rem; cursor:pointer;"></i>
            </div>
            <div class="card" style="background:#111;">
                <h3 id="trader-1-name">P1</h3>
                <input type="number" id="trade-gold-1" oninput="updateTradeOffer(1)" placeholder="Oro gp">
                <div id="trade-items-1" style="max-height:100px; overflow-y:auto; background:#000; padding:10px; margin:10px 0; border:1px solid #333;"></div>
                <div id="trader-1-status" style="font-size:0.7rem; color:#888;">⌛ Editando...</div>
            </div>
            <div style="text-align:center; margin:10px 0;"><i class="fa-solid fa-arrows-rotate" style="color:var(--gold);"></i></div>
            <div class="card" style="background:#111;">
                <div style="display:flex; justify-content:space-between;">
                    <h3 id="trader-2-name">P2</h3>
                    <div id="trader-2-selector-area"></div>
                </div>
                <input type="number" id="trade-gold-2" oninput="updateTradeOffer(2)" placeholder="Oro gp">
                <div id="trade-items-2" style="max-height:100px; overflow-y:auto; background:#000; padding:10px; margin:10px 0; border:1px solid #333;"></div>
                <div id="trader-2-status" style="font-size:0.7rem; color:#888;">⌛ Editando...</div>
            </div>
            <button id="btn-confirm-1" onclick="confirmTradePart(1)" class="btn-primary">CONFIRMAR P1</button>
            <button id="btn-confirm-2" onclick="confirmTradePart(2)" class="btn-primary" style="display:none;">CONFIRMAR P2</button>
            <button id="btn-execute-trade" onclick="executeTrade()" class="btn-primary" style="display:none; background:#008800;">CERRAR TRATO FINAL</button>
        </div>
    </div>

    <div id="role-indicator" style="position:fixed; top:85px; left:20px; font-size:0.7rem; padding:4px 10px; border-radius:20px; background:#222; border:1px solid var(--gold-muted); color:var(--gold); z-index:900;">MODO: <span id="current-role-text">MASTER</span></div>
    <header><h1>Grimoire Pro</h1></header>

    <div class="container">
        <div id="tab-home" class="tab-content">
            <div class="card"><h2 id="campaign-title-display">Aventura</h2><select id="role-selector" onchange="changeRole()"><option value="master">MASTER</option><option value="adventurer">AVENTURERO</option></select><button onclick="exitToLobby()" style="background:#222; color:#fff; padding:12px; width:100%; border-radius:8px; margin-top:20px;">SALIR AL LOBBY</button></div>
        </div>
        <div id="tab-combat" class="tab-content"><div class="card"><h2>Batalla</h2><button onclick="generateRandomEncounter()">ENCONTRAR ENEMIGO</button></div></div>
        <div id="tab-loot" class="tab-content"><div class="card"><h2>Tesoro</h2><button onclick="generateLoot()">GENERAR BOTÍN</button></div></div>
        <div id="tab-party" class="tab-content"><div class="card"><h2>Gremio</h2><div id="character-list"></div><hr><h3>Nuevo Héroe</h3><input type="text" id="char-name" placeholder="Nombre..."><select id="char-race"></select><select id="char-class"></select><button onclick="createCharacter()" class="btn-primary">UNIR</button></div></div>
    </div>
    <nav id="main-nav"></nav>
    <script src="app.js"></script>
</body>
</html>
