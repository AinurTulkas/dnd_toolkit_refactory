<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D0 Toolkit - Grimoire</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-dark: #1a1a1a;
            --dnd-red: #b30000;
            --gold: #d4af37;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --accent-glow: rgba(179, 0, 0, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin: 0;
            letter-spacing: 2px;
        }

        .container {
            padding: 15px;
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: var(--card-dark);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #333;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.98);
        }

        button {
            background: linear-gradient(135deg, var(--dnd-red) 0%, #7a0000 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px var(--accent-glow);
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            filter: brightness(1.2);
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }

        /* Nav Moderna */
        nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 10px;
            border-radius: 25px;
            border: 1px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z_index: 1000;
        }

        nav button {
            background: transparent;
            box-shadow: none;
            width: auto;
            margin: 0;
            padding: 5px;
            color: var(--text-dim);
            font-size: 0.7rem;
            display: flex;
            fex-direction: column;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        nav button.active {
            color: var(--gold);
        }

        .tab-content { display: none; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, select {
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            box-sizeng: border-box;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>D&D0 Grimoire</h1>
    </header>

    <div class="container">
        <!-- Dashboard -->
        <div id="tab-home" class="tab-content" style="display: block;">
            <div class="card" style="text-align:center;">
                <h2>Panel del Master</h2>
                <p style="color: var(--text-dim);">Activa los artefactos para tu sesión.</p>
            </div>
            <div id="config-panel" class="card"></div>
        </div>

        <div id="tab-combat" class="tab-content">
            <div class="card">
                <h2>Tablero de Guerra</h2>
                <p>Combate táctico activo.</p>
            </div>
        </div>

        <div id="tab-loot" class="tab-content">
            <div class="card">
                <h2>Cámara de Tesoros</h2>
                <button onclick="generateDetailedLoot(1)">Generar Oro</button>
                <div id="loot-display"></div>
            </div>
        </div>

        <div id="tab-party" class="tab-content">
            <div class="card">
                <h2>Gremio de Héroes</h2>
                <div id="party-list"></div>
                <button onclick="showTab('tab-create')">+ Reclutar</button>
            </div>
        </div>
    </div>

    <nav id="main-nav">
        <button onclick="showTab('tab-home')" class="active">﻿<br>Inicio</button>
        <button onclick="showTab('tab-combat')">⚔<br>Guerra</button>
        <button onclick="showTab('tab-loot')">💳<br>Oro</button>
        <button onclick="showTab('tab-party')">📻<br>Gremio</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
