<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Grimoire Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        #lobby-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; overflow-y: auto; }
        .lobby-content { max-width: 500px; width: 100%; }
        #global-board-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 6000; display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto; }
        .campaign-item { background: #111; border: 1px solid var(--gold-muted); padding: 20px; margin-bottom: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .campaign-info { flex: 1; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-input-group { text-align: center; }
        .stat-input-group label { font-size: 0.7rem; display: block; margin-bottom: 5px; color: var(--gold); }
        .stat-input-group input { text-align: center; padding: 8px; font-size: 1rem; width: 100%; }
        #role-indicator { position: fixed; top: 85px; left: 20px; font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; background: #222; border: 1px solid var(--gold-muted); color: var(--gold); z-index: 900; }
        .search-bar { background: #111; border: 1px solid var(--gold); border-radius: 10px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .search-bar input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        #monster-search-results { max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="lobby-overlay">
        <div class="lobby-content">
            <h1 style="font-family: 'Cinzel'; color: var(--gold); font-size: 2.5rem; margin-bottom: 10px;">Grimorio Pro</h1>
            <button onclick="toggleGlobalBoard(true)" class="btn-primary" style="background: #004488; margin-bottom: 30px;"><i class="fa-solid fa-users-rectangle"></i> MESAS DE JUEGO</button>
            <div class="card"><h2 style="font-size: 1.4rem;">Mis Campañas</h2><div id="campaign-list"></div><button onclick="showCreateCampaign()" class="btn-primary" style="margin-top: 20px;">+ NUEVA CAMPAÑA</button></div>
            <div id="create-campaign-form" style="display: none; margin-top: 30px;" class="card"><h3 id="campaign-form-title">Nueva Campaña</h3><input type="text" id="new-campaign-name" placeholder="Nombre..."><input type="hidden" id="edit-campaign-id"><button onclick="saveCampaign()" class="btn-primary" id="btn-save-campaign">CREAR</button><button onclick="hideCreateCampaign()" style="background:transparent; border:none; color:#666; margin-top:10px;">CANCELAR</button></div>
        </div>
    </div>

    <div id="global-board-overlay">
        <div style="max-width: 500px; margin: 0 auto; width: 100%;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;"><h2 style="font-family: 'Cinzel'; color: var(--gold);">Mesas de Juego</h2><i class="fa-solid fa-xmark" onclick="toggleGlobalBoard(false)" style="color: var(--gold); font-size: 1.5rem; cursor:pointer;"></i></div>
            <div class="card" style="border-style: dashed;"><h3>Publicar Anuncio</h3><select id="global-notice-type"><option value="lfm">BUSCO JUGADORES (Master)</option><option value="lfg">BUSCO MIS (Jugador)</option></select><input type="text" id="global-notice-title" placeholder="Título..."><textarea id="global-notice-content" placeholder="Descripción..."></textarea><input type="text" id="global-notice-contact" placeholder="Contacto..."><button onclick="publishGlobalNotice()" class="btn-primary">PUBLICA EN LA COMUNIDAD</button></div>
            <div id="global-notices-container"></div>
        </div>
    </div>

    <div id="role-indicator">MODO: <span id="current-role-text">MASTER</span></div>
    <div id="dice-overlay"><div class="dice-tray"><div style="text-align:right;"><i class="fa-solid fa-xmark" onclick="toggleDiceTray()" style="cursor:pointer; color: var(--gold);"></i></div><div id="dice-result-area">--</div><div id="dice-selected-list"></div><div class="dice-grid"><div class="dice-box" onclick="addDiceToTray(4)">d4</div><div class="dice-box" onclick="addDiceToTray(6)">d6</div><div class="dice-box" onclick="addDiceToTray(8)">d8</div><div class="dice-box" onclick="addDiceToTray(10)">d10</div><div class="dice-box" onclick="addDiceToTray(12)">d12</div><div class="dice-box" onclick="addDiceToTray(20)">d20</div><div class="dice-box" onclick="addDiceToTray(100)">d100</div><div class="dice-box" onclick="clearTray()" style="color:#ff4444;">CLR</div></div><button onclick="rollAllDice()" class="btn-primary" style="background: var(--gold); color: black;">LANZAR DADOS</button></div></div>
    <header><h1>Grimoire Pro</h1><i class="fa-solid fa-dice-d20 dice-launcher-header" onclick="toggleDiceTray()"></i></header>

    <div class="container">
        <div id="tab-home" class="tab-content">
            <div class="card"><h2 id="campaign-title-display">Campaña</h2><div style="margin: 20px 0;"><label>TU ROL:</label><select id="role-selector" onchange="changeRole()"><option value="master">DUNGEON MASTER</option><option value="adventurer">AVENTURERO</option></select></div><button onclick="exitToLobby()" style="background: #222; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold;">SALIR AL LOBBY</button></div>
        </div>

        <div id="tab-combat" class="tab-content">
            <div class="card">
                <h2>Tablero de Guerra</h2>
                <div class="search-bar"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="monster-search-input" placeholder="Buscar monstruo SRD..." onkeyup="searchMonsters()"></div>
                <div id="monster-search-results"></div>
                <hr style="border-top:1px solid #222; margin:20px 0;">
                <p style="font-size:0.8rem; color:var(--gold);">MONSTRUOS RECIENTES</p>
                <div id="monster-recent-list"></div>
            </div>
        </div>

        <div id="tab-loot" class="tab-content">
            <div class="card">
                <h2>Cámara de Tesoros</h2>
                <div class="form-group"><label>CR del Encuentro</label><input type="number" id="loot-cr" value="1" min="0" max="20" style="text-align:center;"></div>
                <button onclick="generateLoot()" class="btn-primary" style="margin-bottom: 20px;">GENERAR BOTÍN</button>
                <div id="loot-result" style="margin-bottom: 30px;"></div>
            </div>
        </div>

        <div id="tab-community" class="tab-content">
            <div class="card"><h2>Misiones</h2><div class="master-only"><input type="text" id="notice-title" placeholder="Título..."><textarea id="notice-content" placeholder="Descripción..."></textarea><input type="text" id="notice-reward" placeholder="Recompensa..."><button onclick="publishNotice()" class="btn-primary">CLAVAR CONTRATO</button></div><div id="notices-container"></div></div>
        </div>
        
        <div id="tab-party" class="tab-content">
            <div class="card">
                <h2>Héroes</h2><div id="character-list"></div>
                <div id="create-char-section"><hr style="border: 0; border-top: 1px solid #222; margin: 25px 0;"><h3>Crear Héroe</h3><input type="text" id="char-name" placeholder="Nombre..."><div style="display:flex; gap:10px;"><select id="char-race"></select><select id="char-class"></select></div><div class="stats-grid"><div class="stat-input-group"><label>STR</label><input type="number" id="char-str" value="10"></div><div class="stat-input-group"><label>DEX</label><input type="number" id="char-dex" value="10"></div><div class="stat-input-group"><label>CON</label><input type="number" id="char-con" value="10"></div><div class="stat-input-group"><label>INT</label><input type="number" id="char-int" value="10"></div><div class="stat-input-group"><label>WIS</label><input type="number" id="char-wis" value="10"></div><div class="stat-input-group"><label>CHA</label><input type="number" id="char-cha" value="10"></div></div><select id="char-gender"></select><button onclick="createCharacter()" class="btn-primary">UNIR AL GRUPO</button></div>
            </div>
        </div>
    </div>
    <nav id="main-nav"></nav>
    <script src="app.js"></script>
</body>
</html>
