<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D0 Grimoire Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #0a0a0a; --card-dark: #121212; --dnd-red: #8b0000; --gold: #c5a059; --text-main: #e0e0e0; --text-dim: #888; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main ; margin: 0; padding-bottom: 100px; }
        header { background: #111; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.2rem; margin: 0; letter-spacing: 2px; }
        
        /* BotĂłn Dados en Header */
        .dice-btn-header { color: var(--gold); font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .dice-btn-header:hover { transform: scale(1.1); }

        /* Overlay Dados */
        #dice-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z_index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        .dice-tray { background: #1a1a1a; width: 90%; max-width: 400px; border-radius: 20px; border: 1px solid var(--gold); padding: 20px; text-align: center; }
        .dice-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .dice-box { background: #222; border: 1px solid #333; padding: 10px; border-radius: 10px; cursor: pointer; color: var(--gold); font-weight: bold; }
        .dice-box:active { background: var(--dnd-red); }
        #dice-result-area { min-height: 100px; display: flex; flex-direction: column; justify-content: center; margin-bottom: 20px; }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: var(--card-dark); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #1f1f1f; }
        .tab-content { display: none; }
        nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-radius: 30px; border: 1px solid rgba(197, 160, 89, 0.3); z_index: 1000; }
        nav button { background: transparent; border: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        nav button i { font-size: 1.8rem; }
        nav button span { font-size: 0.55rem; text-transform: uppercase; }
        nav button.active { color: var(--gold); }
        .module-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1f1f1f; }
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; }
        .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 20px; transition: 0.4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.4s; }
        input:checked + .slider { background: var(--dnd-red); }
        input:checked + .slider:before { transform: translatgX(16px); }
    </style>
</head>
<body>
    <!-- Overlay de Dados -->
    <div id="dice-overlay">
        <div class="dice-tray">
            <div style="text-align:right;"><i class="fa-solid fa-circle-xmark" onclick="toggleDiceTray()" style="cursor:pointer;"></i></div>
            <div id="dice-result-area">--</div>
            <div id="dice-selected-list" style="color:var(--text-dim); margin-bottom:10px;"></div>
            <div class="dice-grid">
                <div class="dice-box" onclick="addDiceToTray(4)">d4</div>
                <div class="dice-box" onclick="addDiceToTray(6)">d6</div>
                <div class="dice-box" onclick="addDiceToTray(8)">d8</div>
                <div class="dice-box" onclick="addDiceToTray(10)">d10</div>
                <div class="dice-box" onclick="addDiceToTray(12)">d12</div>
                <div class="dice-box" onclick="addDiceToTray(20)">d20</div>
                <div class="dice-box" onclick="addDiceToTray(100)">d100</div>
                <div class="dice-box" onclick="clearTray()" style="color:red;">CLR</div>
            </div>
            <button onclick="rollAllDice()" style="background:var(--gold); color:black; font-family:'Cinzel'; font-weight:bold; width:100%; padding:15px; border-radius:10px; border:none;">LANZAR DADOS</button>
        </div>
    </div>

    <header>
        <h1><i class="fa-solid fa-dragon"></i> GRIMOIRE-/h1>
        <i class="fa-solid fa-dice-d20 dice-btn-header" onclick="toggleDiceTray()"></i>
    </header>

    <div class="container">
        <div id="tab-home" class="tab-content" style="display:block;">
            <div class="card" style="text-align:center;">
                <h2>Panel del Master</h2>
                <div id="config-panel"></div>
            </div>
        </div>
        <div id="tab-combat" class="tab-content"><div class="card"><h2>Guerra</h2></div></div>
        <div id="tab-loot" class="tab-content"><div class="card"><h2>Tesoros</h2></div></div>
        <div id="tab-party" class="tab-content">
            <div class="card">
                <h2>H°éroes</h2>
                <div id="party-list"></div>
                <input type="text" id="p-name" placeholder="Nombre hĂĄĘoe...">
                <select id="p-class"><option value="Guerrero">Guerrero</option><option value="Mago">Mago</option></select>
                <button onclick="addDetailedPlayer()" style="background:var(--dnd-red); color:white; border:none; padding:10px; width:100%; border-radius:10px; font-family:'Cinzel'; margin-top:10px;">Reclutar</button>
            </div>
        </div>
    </div>

    <nav id="main-nav"></nav>

    <script src="app.js"></script>
</body>
</html>
