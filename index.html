<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Grimoire Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="modal-overlay">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <div id="lobby-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:5000; overflow-y:auto;">
        <header style="padding:40px 20px; text-align:center;">
            <h1 style="font-size:2.8rem; margin:0;">Grimoire Pro</h1>
            <p style="color:var(--gold-muted); font-style:italic;">Asistente para Dungeon Masters</p>
        </header>

        <div style="max-width:600px; margin:0 auto; padding:0 20px;">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2>Tablón Global</h2>
                    <button onclick="window.openGlobalNoticeModal()" class="btn-secondary" style="font-size:0.7rem;">+ RECLUTAR</button>
                </div>
                <div id="global-board" style="max-height:200px; overflow-y:auto; background:#000; padding:10px; border-radius:8px;"></div>
            </div>

            <div class="card">
                <h2>Mis Campañas</h2>
                <div id="campaign-list"></div>
                <button onclick="window.showCampaignForm()" class="btn-primary" style="margin-top:20px;">INICIAR NUEVA AVENTURA</button>
            </div>
        </div>
    </div>

    <div id="role-indicator" style="position:fixed; top:20px; left:20px; z-index:1000; display:none;" class="status-badge">MODO: <span id="role-text">MASTER</span></div>

    <div class="container">
        <div id="tab-home" class="tab-content">
            <div class="card">
                <h2 id="campaign-title">Aventura</h2>
                <div style="margin:20px 0;">
                    <label>TU ROL:</label>
                    <select id="role-selector" onchange="window.changeRole()">
                        <option value="master">DUNGEON MASTER</option>
                        <option value="adventurer">AVENTURERO</option>
                    </select>
                </div>
                <button onclick="window.exitToLobby()" class="btn-secondary" style="width:100%;">VOLVER AL LOBBY</button>
            </div>
        </div>

        <div id="tab-combat" class="tab-content">
            <div class="card">
                <h2>Cámara de Batalla</h2>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
                    <button onclick="window.generateEncounter('normal')" class="btn-primary">SUCURSIÓN</button>
                    <button onclick="window.generateEncounter('hard')" class="btn-primary" style="border-color:#ff4444;">GRAN DESAFÍO</button>
                </div>
                <div id="battle-result"></div>
                <hr style="border-top:1px solid #222; margin:25px 0;">
                <input type="text" id="monster-search" placeholder="Buscar en el manual..." onkeyup="window.searchMonsters()">
                <div id="search-results"></div>
            </div>
        </div>

        <div id="tab-loot" class="tab-content">
            <div class="card">
                <h2>Cámara de Oro</h2>
                <div class="form-group"><label>Nivel de Encuentro (CR)</label><input type="number" id="loot-cr" value="1"></div>
                <div style="margin:15px 0;"><label>¿EN GUARIDA?</label><input type="checkbox" id="is-lair-loot"></div>
                <button onclick="window.generateLoot()" class="btn-primary">GENERAR TESORO</button>
                <div id="loot-display" style="margin-top:20px;"></div>
            </div>
        </div>

        <div id="tab-notices" class="tab-content">
            <div class="card">
                <h2>Misiones de la Party</h2>
                <div id="local-board"></div>
                <div class="master-only" style="margin-top:30px; border-top:1px solid #333; padding-top:20px;">
                    <h3>Publicar Misión</h3>
                    <input type="text" id="mission-title" placeholder="Título...">
                    <textarea id="mission-text" placeholder="Instrucciones del Master..." style="height:100px;"></textarea>
                    <button onclick="window.addMission()" class="btn-primary">CLAVAR EN EL TABLÓN</button>
                </div>
            </div>
        </div>

        <div id="tab-party" class="tab-content">
            <div class="card">
                <h2>Gremio de Aventureros</h2>
                <div id="character-list"></div>
                <button onclick="window.showCharForm()" class="btn-primary" style="margin-top:20px;">+ NUEVO HÉROE</button>
            </div>
        </div>
    </div>

    <nav id="main-nav"></nav>
    <script src="app.js"></script>
</body>
</html>
