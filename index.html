<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Grimoire Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="modal-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;z-index:10000;align-items:center;justify-content:center;">
        <div id="modal-body" style="background:#141414;padding:25px;border:2px solid #c5a059;border-radius:15px;width:90%;max-width:400px;"></div>
    </div>
    <div id="lobby-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:5000;padding:20px;overflow-y:auto;"></div>
    <div class="container" style="padding:20px;">
        <div id="tab-home" class="tab-content" style="display:none;">
            <h1 id="campaign-title"></h1>
            <button onclick="window.toggleXP(false)">Hitos</button>
            <button onclick="window.exitToLobby()">Salir</button>
        </div>
        <div id="tab-party" class="tab-content" style="display:none;">
            <h2>Gremio</h2>
            <div id="character-list"></div>
            <button onclick="window.showCharForm()">+ Heroe</button>
        </div>
    </div>
    <nav style="position:fixed;bottom:0;width:100%;background:#000;display:flex;justify-content:space-around;padding:15px;">
        <button onclick="window.showTab('tab-home')">Home</button>
        <button onclick="window.showTab('tab-party')">Party</button>
    </nav>
    <script src="app.js"></script>
</body>
</html>
